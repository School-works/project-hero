<div class="edit-container" *ngIf="hero">
  <h2>Edit Hero</h2>

  <div class="form-group">
    <label for="nome">Name:</label>
    <input
      id="nome"
      type="text"
      [(ngModel)]="hero.nome"
      placeholder="Hero name"
    />
  </div>

  <div class="form-group">
    <label for="potere">Potere:</label>
    <input
      id="potere"
      type="text"
      [(ngModel)]="hero.potere"/>
  </div>

  <div class="form-group">
    <label for="completata">La missione è completata?:</label>
    <input
      id="completata"
      type="checkbox"
      [(ngModel)]="hero.completata"
    />
  </div>

  <div class="button-group">
    <button (click)="saveHero()" class="btn-save">Save</button>
    <button (click)="cancel()" class="btn-cancel">Cancel</button>
  </div>
</div>
